<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>YAP Media · Vision System</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600;1,700&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/index.css">
</head>
<body>

<!-- ══════════════════
     SCREEN 1: PROFILE
════════════════════ -->
<div class="screen active" id="screen-profile">
  <div class="profile-bg"></div>
  <div class="profile-noise"></div>

  <div class="profile-inner">
    <p class="profile-eyebrow">YAP Vision System</p>

    <img src="Yap-logo.png" alt="YAP Media" class="profile-logo">

    <h1 class="profile-question">Who's viewing?</h1>
    <p class="profile-sub">Select your profile or enter your name</p>

    <div class="profile-names">
      <button class="name-btn" onclick="selectName('Hala Taha', this)">
        <span class="name-label">Hala Taha</span>
        <span class="name-role">Founder · YAP Media</span>
      </button>
      <button class="name-btn" onclick="selectName('Board Member', this)">
        <span class="name-label">Board Member</span>
        <span class="name-role">Executive Viewer</span>
      </button>
      <button class="name-btn" onclick="selectName('Guest', this)">
        <span class="name-label">Guest</span>
        <span class="name-role">Invited Viewer</span>
      </button>
    </div>

    <div class="name-divider">
      <div class="name-divider-line"></div>
      <span class="name-divider-text">or type your name</span>
      <div class="name-divider-line"></div>
    </div>

    <div class="name-input-wrap">
      <input
        class="name-input" id="nameInput" type="text"
        placeholder="Enter your name"
        oninput="onTypeInput(this.value)"
        onkeydown="if(event.key==='Enter') proceed()"
      >
    </div>

    <button class="enter-btn" id="enterBtn" onclick="proceed()"
      disabled style="opacity:0.35; cursor:not-allowed;">
      <span>Enter System</span>
    </button>
  </div>

  <div class="profile-footer">Powered by <strong>PR3NC2</strong></div>
</div>


<!-- ══════════════════
     SCREEN 2: LOADING
════════════════════ -->
<div class="screen" id="screen-loading">
  <div class="loading-ring"></div>
  <div class="loading-text">
    Initializing YAP Vision System<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>
  </div>
</div>


<!-- ══════════════════
     SCREEN 3: WELCOME — 3D CARD GRID
════════════════════ -->
<div class="screen" id="screen-welcome">

  <div class="card-grid-scene">
    <div class="card-grid" id="cardGrid">
      <div class="grid-card"><img src="slide1.jpg" alt="YAP Media"></div>
      <div class="grid-card"><img src="slide2.png" alt="YAP Media"></div>
      <div class="grid-card"><img src="slide3.png" alt="YAP Media"></div>
      <div class="grid-card"><img src="Yap-logo.png" alt="YAP Media"></div>
      <div class="grid-card"><img src="slide5.jpg" alt="YAP Media"></div>
      <div class="grid-card"><img src="slide1.jpg" alt="YAP Media"></div>
      <div class="grid-card"><img src="slide2.png" alt="YAP Media"></div>
      <div class="grid-card"><img src="slide3.png" alt="YAP Media"></div>
      <div class="grid-card"><img src="slide6.jpg" alt="YAP Media"></div>
    </div>
  </div>

  <div class="slide-fade"></div>

  <div class="welcome-content">
    <div class="welcome-viewer-tag" id="viewerTag">Viewer · Hala Taha</div>

    <h1 class="welcome-title">
      Welcome to YAP<br>
      Media Network
    </h1>

    <p class="welcome-subtitle">Audience Intelligence · Vision Prototype</p>

    <div class="welcome-buttons">
      <button class="welcome-btn-primary" onclick="window.location.href='yap-ui.html'">
        Users Interface
      </button>
      <button class="welcome-btn-secondary" onclick="alert('Admin Interface — coming soon')">
        Admin Interface
      </button>
    </div>

    <p class="welcome-footer">Powered by <strong>PR3NC2</strong></p>
  </div>

</div>

<script src="assets/js/index.js"></script>
</body>
</html>
