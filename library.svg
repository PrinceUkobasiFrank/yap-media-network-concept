<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient for depth -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Glass surface gradient -->
    <linearGradient id="glassSurface" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.05"/>
    </linearGradient>
    
    <!-- Edge highlight gradient -->
    <linearGradient id="edgeHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
    
    <!-- Inner shadow for depth -->
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="2" dy="4" result="offsetBlur"/>
      <feComposite in="offsetBlur" in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadowDiff"/>
      <feFlood flood-color="#000000" flood-opacity="0.15"/>
      <feComposite in2="shadowDiff" operator="in"/>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
    
    <!-- Drop shadow for floating effect -->
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="0" dy="12" result="offsetBlur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Stronger blur for backdrop simulation -->
    <filter id="strongBlur">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    
    <!-- Library icon: books on a shelf -->
    <g id="libraryShape">
      <!-- Shelf base -->
      <rect x="35" y="145" width="130" height="12" rx="3"/>
      <!-- Book 1 (tall, left) -->
      <rect x="45" y="55" width="22" height="90" rx="2"/>
      <!-- Book 2 (medium, center-left) -->
      <rect x="72" y="70" width="20" height="75" rx="2"/>
      <!-- Book 3 (short, leaning right) -->
      <rect x="97" y="80" width="18" height="65" rx="2" transform="rotate(8 97 145)"/>
      <!-- Book 4 (tall, right) -->
      <rect x="122" y="60" width="24" height="85" rx="2"/>
      <!-- Book 1 spine line -->
      <rect x="52" y="65" width="8" height="70" rx="1"/>
      <!-- Book 2 spine line -->
      <rect x="78" y="80" width="8" height="55" rx="1"/>
      <!-- Book 4 spine line -->
      <rect x="130" y="70" width="8" height="65" rx="1"/>
    </g>
    
    <!-- Inner library shape for thin border -->
    <g id="libraryInner">
      <rect x="38" y="148" width="124" height="6" rx="2"/>
      <rect x="48" y="58" width="16" height="84" rx="1"/>
      <rect x="75" y="73" width="14" height="69" rx="1"/>
      <rect x="100" y="83" width="12" height="59" rx="1" transform="rotate(8 100 148)"/>
      <rect x="125" y="63" width="18" height="79" rx="1"/>
    </g>
  </defs>
  
  <!-- Background glow -->
  <circle cx="100" cy="100" r="80" fill="url(#bgGlow)"/>
  
  <!-- Simulated blurred background elements behind glass -->
  <g filter="url(#strongBlur)" opacity="0.6">
    <circle cx="70" cy="70" r="25" fill="#ec4899"/>
    <circle cx="140" cy="60" r="20" fill="#8b5cf6"/>
    <circle cx="130" cy="130" r="30" fill="#06b6d4"/>
    <circle cx="60" cy="140" r="18" fill="#10b981"/>
  </g>
  
  <!-- Glass base shape with shadow -->
  <use href="#libraryShape" fill="url(#glassSurface)" filter="url(#dropShadow)"/>
  
  <!-- Inner shadow for depth -->
  <use href="#libraryShape" fill="none" filter="url(#innerShadow)"/>
  
  <!-- Top edge highlights on books -->
  <rect x="45" y="55" width="22" height="3" rx="1" fill="white" opacity="0.4"/>
  <rect x="72" y="70" width="20" height="3" rx="1" fill="white" opacity="0.4"/>
  <rect x="97" y="80" width="18" height="3" rx="1" fill="white" opacity="0.4" transform="rotate(8 97 145)"/>
  <rect x="122" y="60" width="24" height="3" rx="1" fill="white" opacity="0.4"/>
  
  <!-- Shelf top highlight -->
  <rect x="35" y="145" width="130" height="2" rx="1" fill="white" opacity="0.3"/>
  
  <!-- Left edge highlights on books -->
  <rect x="45" y="55" width="2" height="90" rx="1" fill="url(#edgeHighlight)" opacity="0.5"/>
  <rect x="72" y="70" width="2" height="75" rx="1" fill="url(#edgeHighlight)" opacity="0.5"/>
  <rect x="122" y="60" width="2" height="85" rx="1" fill="url(#edgeHighlight)" opacity="0.5"/>
  
  <!-- Specular highlight (shine spot on left book) -->
  <ellipse cx="56" cy="75" rx="6" ry="10" fill="white" opacity="0.25" transform="rotate(-15 56 75)"/>
  
  <!-- Second shine on right book -->
  <ellipse cx="134" cy="80" rx="5" ry="8" fill="white" opacity="0.2" transform="rotate(-15 134 80)"/>
  
  <!-- Thin border stroke -->
  <use href="#libraryShape" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Second thinner inner stroke -->
  <use href="#libraryInner" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>
</svg>