<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient for depth -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Glass surface gradient -->
    <linearGradient id="glassSurface" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.05"/>
    </linearGradient>
    
    <!-- Edge highlight gradient -->
    <linearGradient id="edgeHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
    
    <!-- Live red gradient for badge -->
    <linearGradient id="liveRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.3"/>
    </linearGradient>
    
    <!-- Inner shadow for depth -->
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="2" dy="4" result="offsetBlur"/>
      <feComposite in="offsetBlur" in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadowDiff"/>
      <feFlood flood-color="#000000" flood-opacity="0.15"/>
      <feComposite in2="shadowDiff" operator="in"/>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
    
    <!-- Drop shadow for floating effect -->
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="0" dy="12" result="offsetBlur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Stronger blur for backdrop simulation -->
    <filter id="strongBlur">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    
    <!-- Live streaming icon: broadcast tower with signal waves -->
    <g id="liveShape">
      <!-- Outer signal wave -->
      <path d="M65 75 A35 35 0 0 1 135 75" fill="none" stroke-width="6" stroke-linecap="round"/>
      <!-- Middle signal wave -->
      <path d="M75 85 A25 25 0 0 1 125 85" fill="none" stroke-width="6" stroke-linecap="round"/>
      <!-- Inner signal wave -->
      <path d="M85 95 A15 15 0 0 1 115 95" fill="none" stroke-width="6" stroke-linecap="round"/>
      <!-- Tower base / dot -->
      <circle cx="100" cy="110" r="10"/>
      <!-- LIVE badge pill -->
      <rect x="65" y="140" width="70" height="22" rx="11"/>
      <!-- LIVE badge dot -->
      <circle cx="78" cy="151" r="4"/>
    </g>
    
    <!-- Inner live shape for thin border -->
    <g id="liveInner">
      <path d="M68 75 A32 32 0 0 1 132 75" fill="none" stroke-width="3" stroke-linecap="round"/>
      <path d="M78 85 A22 22 0 0 1 122 85" fill="none" stroke-width="3" stroke-linecap="round"/>
      <path d="M88 95 A12 12 0 0 1 112 95" fill="none" stroke-width="3" stroke-linecap="round"/>
      <circle cx="100" cy="110" r="7"/>
      <rect x="68" y="143" width="64" height="16" rx="8"/>
      <circle cx="78" cy="151" r="2"/>
    </g>
  </defs>
  
  <!-- Background glow (red-tinted for live energy) -->
  <circle cx="100" cy="100" r="80" fill="url(#bgGlow)"/>
  
  <!-- Simulated blurred background elements behind glass -->
  <g filter="url(#strongBlur)" opacity="0.6">
    <circle cx="70" cy="70" r="25" fill="#f59e0b"/>
    <circle cx="140" cy="60" r="20" fill="#ef4444"/>
    <circle cx="130" cy="130" r="30" fill="#f97316"/>
    <circle cx="60" cy="140" r="18" fill="#eab308"/>
  </g>
  
  <!-- Glass base shape with shadow -->
  <use href="#liveShape" fill="url(#glassSurface)" filter="url(#dropShadow)"/>
  
  <!-- Inner shadow for depth -->
  <use href="#liveShape" fill="none" filter="url(#innerShadow)"/>
  
  <!-- LIVE badge filled with red tint -->
  <rect x="65" y="140" width="70" height="22" rx="11" fill="url(#liveRed)" opacity="0.8"/>
  
  <!-- LIVE badge dot filled red -->
  <circle cx="78" cy="151" r="4" fill="#ef4444" opacity="0.9"/>
  
  <!-- Top edge highlights on waves -->
  <path d="M65 75 A35 35 0 0 1 100 40" fill="none" stroke="white" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <path d="M75 85 A25 25 0 0 1 100 60" fill="none" stroke="white" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
  <path d="M85 95 A15 15 0 0 1 100 80" fill="none" stroke="white" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  
  <!-- Left edge highlights on waves -->
  <path d="M65 75 A35 35 0 0 0 65 75" fill="none" stroke="url(#edgeHighlight)" stroke-width="1.5" opacity="0.5"/>
  <path d="M75 85 A25 25 0 0 0 75 85" fill="none" stroke="url(#edgeHighlight)" stroke-width="1.5" opacity="0.45"/>
  <path d="M85 95 A15 15 0 0 0 85 95" fill="none" stroke="url(#edgeHighlight)" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Tower dot top highlight -->
  <ellipse cx="95" cy="103" rx="4" ry="3" fill="white" opacity="0.4"/>
  
  <!-- LIVE badge top highlight -->
  <rect x="65" y="140" width="70" height="2" rx="1" fill="white" opacity="0.4"/>
  
  <!-- Specular highlight (shine spot on outer wave) -->
  <ellipse cx="72" cy="62" rx="6" ry="4" fill="white" opacity="0.3" transform="rotate(-30 72 62)"/>
  
  <!-- Second shine on middle wave -->
  <ellipse cx="80" cy="72" rx="5" ry="3" fill="white" opacity="0.25" transform="rotate(-30 80 72)"/>
  
  <!-- Third shine on tower dot -->
  <ellipse cx="96" cy="106" rx="3" ry="2" fill="white" opacity="0.35"/>
  
  <!-- Thin border stroke -->
  <use href="#liveShape" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Second thinner inner stroke -->
  <use href="#liveInner" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>
</svg>