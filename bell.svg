<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient for depth -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Glass surface gradient -->
    <linearGradient id="glassSurface" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.05"/>
    </linearGradient>
    
    <!-- Edge highlight gradient -->
    <linearGradient id="edgeHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
    
    <!-- Inner shadow for depth -->
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="2" dy="4" result="offsetBlur"/>
      <feComposite in="offsetBlur" in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadowDiff"/>
      <feFlood flood-color="#000000" flood-opacity="0.15"/>
      <feComposite in2="shadowDiff" operator="in"/>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
    
    <!-- Drop shadow for floating effect -->
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="0" dy="12" result="offsetBlur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Stronger blur for backdrop simulation -->
    <filter id="strongBlur">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    
    <!-- Notification bell icon -->
    <g id="bellShape">
      <!-- Bell body -->
      <path d="M100 35 
               C75 35, 55 55, 55 85 
               C55 105, 45 120, 40 130 
               L160 130 
               C155 120, 145 105, 145 85 
               C145 55, 125 35, 100 35Z"/>
      <!-- Bell rim -->
      <rect x="35" y="125" width="130" height="10" rx="5"/>
      <!-- Clapper -->
      <circle cx="100" cy="145" r="12"/>
      <!-- Notification dot -->
      <circle cx="135" cy="55" r="10"/>
    </g>
    
    <!-- Inner bell shape for thin border -->
    <g id="bellInner">
      <path d="M100 40 
               C78 40, 60 58, 60 85 
               C60 103, 52 117, 48 125 
               L152 125 
               C148 117, 140 103, 140 85 
               C140 58, 122 40, 100 40Z"/>
      <rect x="40" y="128" width="120" height="4" rx="2"/>
      <circle cx="100" cy="142" r="8"/>
      <circle cx="135" cy="55" r="7"/>
    </g>
  </defs>
  
  <!-- Background glow -->
  <circle cx="100" cy="100" r="80" fill="url(#bgGlow)"/>
  
  <!-- Simulated blurred background elements behind glass -->
  <g filter="url(#strongBlur)" opacity="0.6">
    <circle cx="70" cy="70" r="25" fill="#ec4899"/>
    <circle cx="140" cy="60" r="20" fill="#8b5cf6"/>
    <circle cx="130" cy="130" r="30" fill="#06b6d4"/>
    <circle cx="60" cy="140" r="18" fill="#10b981"/>
  </g>
  
  <!-- Glass base shape with shadow -->
  <use href="#bellShape" fill="url(#glassSurface)" filter="url(#dropShadow)"/>
  
  <!-- Inner shadow for depth -->
  <use href="#bellShape" fill="none" filter="url(#innerShadow)"/>
  
  <!-- Top edge highlight on bell dome -->
  <path d="M100 35 C75 35, 55 55, 55 85" fill="none" stroke="white" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
  
  <!-- Left edge highlight on bell body -->
  <path d="M55 85 C55 105, 45 120, 40 130" fill="none" stroke="url(#edgeHighlight)" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  
  <!-- Rim top highlight -->
  <rect x="35" y="125" width="130" height="2" rx="1" fill="white" opacity="0.35"/>
  
  <!-- Clapper left edge highlight -->
  <path d="M88 145 A12 12 0 0 1 100 133" fill="none" stroke="white" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  
  <!-- Notification dot top-left highlight -->
  <ellipse cx="130" cy="50" rx="4" ry="3" fill="white" opacity="0.4" transform="rotate(-45 130 50)"/>
  
  <!-- Specular highlight (shine spot on bell dome) -->
  <ellipse cx="82" cy="62" rx="8" ry="12" fill="white" opacity="0.25" transform="rotate(-20 82 62)"/>
  
  <!-- Second shine on rim -->
  <ellipse cx="70" cy="128" rx="10" ry="3" fill="white" opacity="0.2"/>
  
  <!-- Thin border stroke -->
  <use href="#bellShape" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Second thinner inner stroke -->
  <use href="#bellInner" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>
</svg>
